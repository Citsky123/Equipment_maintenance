<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设备维保系统 - {% block title %}{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 1rem;
        }

        nav a {
            color: white;
            margin-right: 15px;
            text-decoration: none;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .messages {
            margin: 10px 0;
            padding: 10px;
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        .btn {
            display: inline-block;
            padding: 8px 16px;
            margin: 5px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }

        .btn:hover {
            background: #2980b9;
        }

        .btn-danger {
            background: #e74c3c;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-success {
            background: #27ae60;
        }

        .btn-success:hover {
            background: #229954;
        }

        .btn-warning {
            background: #f39c12;
        }

        .btn-warning:hover {
            background: #d68910;
        }

        .form-group {
            margin: 15px 0;
        }

        label {
            display: block;
            margin-bottom: 5px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
        }

        .checkbox {
            display: flex;
            align-items: center;
        }

        .checkbox input {
            margin-right: 10px;
        }
    </style>
</head>

<body>
    <header>
        <div class="container">
            <h1>设备维保系统</h1>
            <nav>
                <a href="{% url 'factory_area:home' %}">首页</a>
                <a href="{% url 'factory_area:list' %}">厂区管理</a>
                <a href="{% url 'factory_area:floor_list' %}">楼层管理</a>
                <a href="{% url 'factory_area:line_list' %}">线体管理</a>
                <a href="{% url 'factory_area:equipment_type_list' %}">设备类型</a>
                <a href="{% url 'factory_area:device_list' %}">设备实例</a>
                <a href="{% url 'factory_area:maintenance_profile_list' %}" style="font-weight: bold;">纳管配置</a>
                <a href="/admin/">系统管理</a>
            </nav>
        </div>
    </header>

    <main class="container">
        {% if messages %}
        {% for message in messages %}
        <div class="messages {{ message.tags }}">{{ message }}</div>
        {% endfor %}
        {% endif %}

        {% block content %}
        {% endblock %}
    </main>

    <footer style="margin-top: 50px; text-align: center; padding: 20px; background: #f8f9fa;">
        <p>&copy; 2026 设备维保系统</p>
    </footer>
</body>

</html>
